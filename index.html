<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>繪本森活・四季共讀 | 專欄首頁</title>
    <style>
        /* 基礎設定 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600;700&display=swap');

        body {
            background-color: #f4f6f5; /* 清新淡雅的灰綠背景 */
            color: #4a4a4a;
            font-family: 'Noto Sans TC', sans-serif;
            line-height: 1.8;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* 網站標題區塊 */
        header {
            text-align: center;
            margin-bottom: 60px;
        }

        .site-title {
            font-family: 'Noto Serif TC', serif;
            font-size: 36px;
            font-weight: 700;
            color: #5c7a72; /* 沉穩森林綠 */
            letter-spacing: 4px;
            margin: 0 0 15px 0;
        }

        .site-subtitle {
            font-size: 16px;
            color: #888;
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* 期數卡片網格佈局 */
        .issue-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        /* 單張卡片設計 */
        .issue-card {
            background-color: #ffffff;
            border-radius: 12px;
            padding: 30px;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            border-top: 5px solid transparent;
        }

        /* 賦予各期不同的頂部點綴色 */
        .issue-card.vol-009 { border-top-color: #c06c64; } /* 珊瑚紅 - 呼應過年 */
        .issue-card.vol-010 { border-top-color: #e6b981; } /* 晨光黃 - 呼應開學 */
        .issue-card.vol-011 { border-top-color: #a38c7b; } /* 燕麥褐 - 呼應同理心 */

        .issue-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(92, 122, 114, 0.1);
        }

        .issue-vol {
            font-size: 14px;
            font-weight: 700;
            color: #a38c7b;
            margin-bottom: 10px;
            font-family: 'Noto Serif TC', serif;
        }

        .issue-title {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            margin: 0 0 15px 0;
            line-height: 1.4;
        }

        .issue-date {
            margin-top: auto;
            font-size: 13px;
            color: #999;
            padding-top: 15px;
            border-top: 1px dashed #eee;
        }

        /* 頁尾 */
        footer {
            text-align: center;
            margin-top: 80px;
            font-size: 13px;
            color: #aaa;
        }

    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 class="site-title">繪本森活・四季共讀</h1>
        <p class="site-subtitle">陪伴孩子在繪本中，感受四季更迭與成長的勇氣</p>
    </header>

    <div class="issue-grid">
        <a href="vol011.html" class="issue-card vol-011">
            <div class="issue-vol">Vol. 011</div>
            <h2 class="issue-title">那不是自私，是還沒學會「我們」</h2>
            <div class="issue-date">發刊日：2026年3月2日（雨水）</div>
        </a>

        <a href="vol010.html" class="issue-card vol-010">
            <div class="issue-vol">Vol. 010</div>
            <h2 class="issue-title">開學不哭？給孩子（和爸媽）的勇氣魔法</h2>
            <div class="issue-date">發刊日：2026年2月23日（開學日）</div>
        </a>

        <a href="vol009.html" class="issue-card vol-009">
            <div class="issue-vol">Vol. 009</div>
            <h2 class="issue-title">除夕圍爐夜：最好的年味，是全家人聚在一起</h2>
            <div class="issue-date">發刊日：2026年2月16日（除夕特輯）</div>
        </a>
    </div>

    <footer>
        &copy; 2026 繪本森活・四季共讀 | 主編：園長 蕭淑芬
    </footer>
</div>

</body>
</html>
